<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Vitória Silva Design</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;600&display=swap" rel="stylesheet">

<style>
body {
  margin:0;
  font-family:'Poppins', sans-serif;
  background: linear-gradient(135deg, #000, #1a0010);
  color:#fff;
}

header {
  text-align:center;
  padding:80px 20px;
}

h1 {
  color:#ff4da6;
  font-size:44px;
}

p {
  color:#ccc;
}

.btn {
  background:#ff4da6;
  padding:15px 30px;
  border-radius:30px;
  text-decoration:none;
  color:white;
  display:inline-block;
  margin-top:20px;
  transition:0.3s;
}

.btn:hover {
  transform:scale(1.05);
  background:#ff1a8c;
}

.section {
  padding:60px 20px;
  text-align:center;
}

.cards {
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.card {
  background:#111;
  margin:15px;
  padding:20px;
  border-radius:15px;
  width:250px;
}

.portfolio img {
  width:250px;
  margin:10px;
  border-radius:10px;
}

footer {
  text-align:center;
  padding:30px;
  background:#111;
}

.whatsapp {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#25d366;
  padding:15px;
  border-radius:50%;
  color:white;
  text-decoration:none;
  font-size:22px;
}
</style>
</head>

<body>

<header>
<h1>Vitória Silva Design</h1>
